{% extends "base.html" %}

{% block title %}Create Event - Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 animate-fade">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-5">Create <span class="text-gradient">New Event</span></h2>

            <form method="POST">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label small opacity-75">Event Title</label>
                        <input type="text" name="title" class="form-control glass-input"
                            placeholder="e.g. Annual Tech Symposium" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label small opacity-75">Description</label>
                        <textarea name="description" class="form-control glass-input" rows="4"
                            placeholder="Tell us more about the event..." required></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small opacity-75">Date</label>
                        <input type="date" name="date" class="form-control glass-input" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small opacity-75">Time</label>
                        <input type="time" name="time" class="form-control glass-input" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small opacity-75">Venue</label>
                        <input type="text" name="venue" class="form-control glass-input"
                            placeholder="e.g. Main Auditorium" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small opacity-75">Category</label>
                        <select name="category" class="form-select glass-input">
                            <option value="Workshop">Workshop</option>
                            <option value="Seminar">Seminar</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Sports">Sports</option>
                            <option value="Tech">Tech</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small opacity-75">Max Participants</label>
                        <input type="number" name="max_participants" class="form-control glass-input" value="100"
                            required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small opacity-75">Price (₹)</label>
                        <input type="number" step="0.01" name="price" class="form-control glass-input" value="0.00">
                    </div>

                    <div class="col-md-4 d-flex align-items-end pb-2">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_paid" id="isPaidSwitch">
                            <label class="form-check-label small opacity-75" for="isPaidSwitch">Is this a paid
                                event?</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label small opacity-75">Registration Deadline</label>
                        <input type="datetime-local" name="deadline" class="form-control glass-input" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label small opacity-75">Image URL (Optional)</label>
                        <input type="url" name="image_url" class="form-control glass-input"
                            placeholder="https://example.com/image.jpg">
                    </div>

                    <div class="col-12 mt-5">
                        <button type="submit" class="btn btn-glass w-100 py-3 fw-bold">Publish Event</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
