{% extends "base.html" %}

{% block title %}Secure Payment - Digital Event Organizer{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 animate-fade">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-5">
                <div class="mb-4">
                    <span class="badge bg-success bg-opacity-25 text-success p-2 px-3 rounded-pill">Secure Sandbox
                        Mode</span>
                </div>
                <h2 class="fw-bold">Complete <span class="text-gradient">Payment</span></h2>
                <p class="opacity-50">Registering for: {{ event.title }}</p>
                <h3 class="fw-bold text-white mt-3">₹ {{ event.price }}</h3>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small opacity-75">Card Number</label>
                    <input type="text" class="form-control glass-input" placeholder="XXXX XXXX XXXX XXXX"
                        value="4242 4242 4242 4242" readonly>
                </div>
                <div class="row mb-5">
                    <div class="col-6">
                        <label class="form-label small opacity-75">Expiry Date</label>
                        <input type="text" class="form-control glass-input" placeholder="MM/YY" value="12/25" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small opacity-75">CVV</label>
                        <input type="password" class="form-control glass-input" placeholder="***" value="123" readonly>
                    </div>
                </div>

                <button type="submit" class="btn btn-glass w-100 py-3 mb-4 fw-bold">
                    Pay Now & Confirm
                </button>

                <p class="text-center small opacity-50 mb-0">
                    Your payment is secured with AES-256 encryption.
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
